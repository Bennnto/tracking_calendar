{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'account/style.css' %}">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a href="{% url 'home' %}">Home</a>
        {% if user.is_authenticated %}
            <span>Welcome {{ user.username }}!</span>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>

    <!-- Main content block -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Tracker App</p>
    </footer>
</body>
</html>
